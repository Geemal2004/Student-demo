<app-page-header title="My Proposals" subtitle="Track status, edit pending submissions, and view match reveal details.">
  <a actions mat-flat-button color="primary" routerLink="/student/create">New Proposal</a>
</app-page-header>

<app-loading-skeleton *ngIf="loading()" [rows]="4"></app-loading-skeleton>

<section *ngIf="!loading() && proposals().length > 0" class="proposal-grid">
  @for (proposal of proposals(); track proposal.id) {
    <app-proposal-card
      [title]="proposal.title"
      [abstract]="proposal.abstract"
      [researchArea]="proposal.researchAreaName"
      [techStack]="proposal.technicalStack ?? ''"
      [status]="proposal.status">
      <div actions>
        <a mat-stroked-button [routerLink]="['/student/proposals', proposal.id]">Details</a>
        <a *ngIf="canEdit(proposal.status)" mat-button [routerLink]="['/student/proposals', proposal.id, 'edit']">Edit</a>
        <button *ngIf="canWithdraw(proposal.status)" mat-button color="warn" (click)="withdraw(proposal.id)">Withdraw</button>
      </div>
    </app-proposal-card>
  }
</section>

<app-empty-state
  *ngIf="!loading() && proposals().length === 0"
  icon="assignment"
  title="No proposals yet"
  message="Create your first proposal to start the blind matching workflow.">
  <a mat-flat-button color="primary" routerLink="/student/create">Create Proposal</a>
</app-empty-state>
