<app-page-header
  [title]="editing() ? 'Edit Proposal' : 'Create Proposal'"
  [subtitle]="editing() ? 'Update your proposal before matching proceeds.' : 'Submit your project idea for blind matching.'">
  <a actions mat-stroked-button routerLink="/student/proposals">Back to proposals</a>
</app-page-header>

<app-loading-skeleton *ngIf="loading()" [rows]="4"></app-loading-skeleton>

<mat-card *ngIf="!loading()">
  <form [formGroup]="form" (ngSubmit)="submit()" class="proposal-form">
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" />
      <mat-hint align="end">{{ form.controls.title.value.length }}/150</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Abstract</mat-label>
      <textarea matInput rows="6" formControlName="abstract"></textarea>
      <mat-hint align="end">{{ form.controls.abstract.value.length }}/1000</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Technical stack</mat-label>
      <input matInput formControlName="technicalStack" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Research area</mat-label>
      <mat-select formControlName="researchAreaId">
        @for (area of areas(); track area.id) {
          <mat-option [value]="area.id">{{ area.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <button mat-flat-button color="primary" type="submit">
      {{ editing() ? 'Save changes' : 'Submit proposal' }}
    </button>
  </form>
</mat-card>
