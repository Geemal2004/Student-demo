<mat-sidenav-container class="shell-container">
  <mat-sidenav #drawer mode="side" opened class="shell-sidenav">
    <div class="brand" (click)="goHome()">
      <h2>BlindMatch PAS</h2>
      <p>Fair, secure allocation</p>
    </div>

    <nav class="nav-links">
      @for (item of navLinks(); track item.link) {
        <a mat-button [routerLink]="item.link" routerLinkActive="active-link">{{ item.label }}</a>
      }
    </nav>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="shell-toolbar">
      <button mat-icon-button (click)="drawer.toggle()" class="mobile-toggle" aria-label="Toggle sidebar">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ user()?.role }} Workspace</span>
      <span class="toolbar-spacer"></span>
      <span class="user-name">{{ user()?.fullName }}</span>
      <button mat-button (click)="logout()">Logout</button>
    </mat-toolbar>

    <main class="shell-main">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
